<!-- ===================== 了了 App 覆盖层 ===================== -->
<div id="liao-app">
  <div class="liao-topbar">
    <button class="liao-tab-btn liao-pill-btn liao-pill-close" id="liao-close-btn">
      <i data-lucide="chevron-left" class="liao-lucide-icon"></i>
    </button>
    <button class="liao-tab-btn liao-pill-btn liao-pill-1 active" data-tab="chatlist">
      <i data-lucide="message-circle" class="liao-lucide-icon"></i>
    </button>
    <button class="liao-tab-btn liao-pill-btn liao-pill-2" data-tab="rolelib">
      <i data-lucide="user-round-cog" class="liao-lucide-icon"></i>
    </button>
    <button class="liao-tab-btn liao-pill-btn liao-pill-3" data-tab="myhome">
      <i data-lucide="heart" class="liao-lucide-icon"></i>
    </button>
    <button class="liao-tab-btn liao-pill-btn liao-pill-4" data-tab="suiyan">
      <i data-lucide="message-square" class="liao-lucide-icon"></i>
    </button>
  </div>

  <div class="liao-main">
    <!-- 聊天列表面板 -->
    <div class="liao-panel active" data-panel="chatlist">
      <div class="chat-list-wrap">
        <div id="liao-chat-list"></div>
      </div>
      <div class="chat-bottom-bar">
        <button class="chat-bar-btn" id="liao-btn-new-role">
          <i data-lucide="user-round" class="liao-lucide-icon"></i>
          <span class="bar-btn-label">新建角色</span>
        </button>
        <button class="chat-bar-btn" id="liao-btn-new-group">
          <i data-lucide="users-round" class="liao-lucide-icon"></i>
          <span class="bar-btn-label">新建群聊</span>
        </button>
        <button class="chat-bar-btn" id="liao-btn-import">
          <i data-lucide="layout-grid" class="liao-lucide-icon"></i>
          <span class="bar-btn-label">导入角色</span>
        </button>
      </div>
    </div>


<!-- 角色库面板：卡册嵌入 -->
<div class="liao-panel" data-panel="rolelib">

  <!-- 封面页 -->
  <div id="liao-cardbook-cover" class="lcb-cover" style="flex:1;">
    <div class="lcb-cover-glass">
      <div class="lcb-cover-title">角色册</div>
      <div class="lcb-cover-sub">ROLE COLLECTION</div>
      <div class="lcb-cover-count" id="lcb-cover-count">0 位角色</div>
    </div>
    <div class="lcb-cover-flip-hint" id="lcb-cover-flip-btn">
      <div class="lcb-flip-arrow">▶</div>
      <div class="lcb-flip-label">翻开</div>
    </div>
  </div>

  <!-- 内页 -->
  <div id="liao-cardbook-inner" class="lcb-inner" style="display:none;flex:1;">
    <div class="lcb-inner-topbar">
      <button class="lcb-back-btn lcb-inner-back" id="lcb-inner-back">←</button>
      <div class="lcb-inner-title">角色册</div>
      <div class="lcb-page-indicator" id="lcb-page-indicator">1 / 1</div>
    </div>
    <div class="lcb-pages-wrap" id="lcb-pages-wrap"></div>
    <div class="lcb-page-nav">
      <button class="lcb-page-btn" id="lcb-prev-page">‹</button>
      <button class="lcb-page-btn" id="lcb-next-page">›</button>
    </div>
  </div>

  <!-- 抽卡预览层 -->
  <div id="lcb-card-preview" class="lcb-card-preview" style="display:none;">
    <div class="lcb-preview-backdrop" id="lcb-preview-backdrop"></div>
    <div class="lcb-preview-card" id="lcb-preview-card">
      <img class="lcb-preview-img" id="lcb-preview-img" src="" alt="">
    </div>
    <div class="lcb-preview-actions">
      <button class="lcb-preview-chat-btn" id="lcb-preview-chat-btn">进入聊天设置</button>
      <button class="lcb-preview-close-btn" id="lcb-preview-close-btn">放回</button>
    </div>
  </div>

  <div id="liao-role-count" style="display:none;"></div>
</div>



    <!-- 我的主页面板 -->
    <div class="liao-panel" data-panel="myhome">
      <div class="my-home-wrap">
        <div class="my-home-menu">
          <div class="my-menu-item" id="menu-persona-lib">
            <div class="my-menu-icon">◈</div>
            <div class="my-menu-info">
              <div class="my-menu-title">我的人设库</div>
              <div class="my-menu-sub">管理你的角色设定与人物档案</div>
            </div>
            <div class="my-menu-arrow">›</div>
          </div>
          <div class="my-menu-item" id="menu-favorites">
            <div class="my-menu-icon">★</div>
            <div class="my-menu-info">
              <div class="my-menu-title">收藏夹</div>
              <div class="my-menu-sub">保存喜欢的对话片段</div>
            </div>
            <div class="my-menu-arrow">›</div>
          </div>
          <div class="my-menu-item">
            <div class="my-menu-icon">◎</div>
            <div class="my-menu-info">
              <div class="my-menu-title">记忆宫殿</div>
              <div class="my-menu-sub">角色的长期记忆与世界观设定</div>
            </div>
            <div class="my-menu-arrow">›</div>
          </div>
          <div class="my-menu-item">
            <div class="my-menu-icon">◆</div>
            <div class="my-menu-info">
              <div class="my-menu-title">美化</div>
              <div class="my-menu-sub">自定义聊天背景与气泡样式</div>
            </div>
            <div class="my-menu-arrow">›</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 随言面板 -->
    <div class="liao-panel" data-panel="suiyan">
      <div class="suiyan-wrap">
        <div class="suiyan-header" id="suiyan-header">
          <button class="suiyan-header-bg-btn" id="suiyan-bg-btn">更换背景</button>
        </div>
        <div class="suiyan-user-row">
          <img class="suiyan-user-avatar" id="suiyan-user-avatar"
            src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=user"
            alt="" style="cursor:pointer;">
          <div class="suiyan-user-name" id="suiyan-user-name" style="cursor:pointer;">用户</div>
          <button class="suiyan-post-btn" id="suiyan-post-btn" title="发随言">+</button>
        </div>
        <div class="suiyan-list" id="suiyan-list"></div>
      </div>
    </div>

  </div>
</div>


<!-- ===================== 我的人设库全屏界面 ===================== -->
<div id="liao-persona-lib-view" style="display:none;position:fixed;inset:0;z-index:480;background:var(--bg,#F5F5F0);flex-direction:column;">
  <div class="cs-topbar">
    <button class="cs-close-btn" id="persona-lib-back">←</button>
    <div class="cs-topbar-title">我的人设库</div>
    <button class="liao-btn-primary" id="persona-lib-add-btn" style="position:absolute;right:14px;padding:6px 14px;font-size:12px;border-radius:999px;">新建</button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:14px 14px 40px;" id="persona-lib-list-wrap">
    <div id="persona-lib-list" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>
</div>

<!-- ===================== 人设编辑弹窗 ===================== -->
<div id="liao-persona-edit-modal" class="liao-bubble-modal" style="display:none;">
  <div class="liao-bubble-modal-box" style="max-height:85dvh;overflow-y:auto;">
    <div class="liao-modal-title" id="persona-edit-title">新建人设</div>
    <div class="liao-avatar-preview-row">
      <img class="liao-avatar-preview" id="persona-edit-avatar-preview"
        src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=persona" alt="">
      <div class="liao-avatar-upload-btns">
        <input class="liao-modal-input" id="persona-edit-avatar-url" placeholder="头像 URL…">
        <button class="liao-avatar-btn" id="persona-edit-avatar-local">本地上传</button>
        <input type="file" id="persona-edit-avatar-file" accept="image/*" style="display:none;">
      </div>
    </div>
    <label class="liao-modal-label">名字</label>
    <input class="liao-modal-input" id="persona-edit-name" placeholder="你的名字…">
    <label class="liao-modal-label">人设描述</label>
    <textarea class="liao-modal-textarea" id="persona-edit-setting" placeholder="描述你的人设、性格、背景…" style="min-height:100px;"></textarea>
    <div class="liao-modal-btns">
      <button class="liao-btn-primary" id="persona-edit-confirm">保存</button>
      <button class="liao-btn-ghost" id="persona-edit-cancel">取消</button>
    </div>
  </div>
</div>

<!-- ===================== 收藏夹全屏界面 ===================== -->
<div id="liao-favorites-view" style="display:none;position:fixed;inset:0;z-index:480;background:var(--bg,#F5F5F0);flex-direction:column;">
  <div class="cs-topbar">
    <button class="cs-close-btn" id="favorites-back">←</button>
    <div class="cs-topbar-title">收藏夹</div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:14px 14px 40px;">
    <div id="favorites-list" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>
</div>
